<div class="p-6 md:p-8 w-full max-w-5xl mx-auto flex flex-col gap-6">
  <div class="flex justify-between items-center">
    <div>
      <h1 class="text-2xl font-bold text-slate-900">Quản lý môn học</h1>
      <p class="text-slate-500 text-sm">Tạo, sửa, xóa môn thi. Môn học dùng cho ngân hàng câu hỏi và kỳ thi.</p>
    </div>
    <button id="btn-create-subject" type="button"
      class="bg-primary text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-primary/90 flex items-center shadow-sm">
      <span class="material-symbols-outlined mr-2 text-lg">add</span> Thêm môn học
    </button>
  </div>

  <div class="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm">
    <table class="w-full text-left border-collapse">
      <thead>
        <tr class="bg-slate-50 border-b border-slate-200">
          <th class="px-6 py-4 text-sm font-medium text-slate-500 w-20">ID</th>
          <th class="px-6 py-4 text-sm font-medium text-slate-500">Tên môn</th>
          <th class="px-6 py-4 text-sm font-medium text-slate-500 w-32">Mã môn</th>
          <th class="px-6 py-4 text-sm font-medium text-slate-500 w-36 text-right">Thao tác</th>
        </tr>
      </thead>
      <tbody id="subjects-tbody" class="divide-y divide-slate-100">
        <tr><td colspan="4" class="px-6 py-8 text-center text-slate-500">Đang tải...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Modal Thêm/Sửa môn -->
  <div id="subject-modal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-md overflow-hidden">
      <div class="px-6 py-4 border-b border-slate-200 flex justify-between items-center">
        <h2 class="text-lg font-bold text-slate-900" id="subject-modal-title">Thêm môn học</h2>
        <button type="button" id="subject-modal-close" class="text-slate-400 hover:text-slate-600 p-1">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <form id="subject-form" class="p-6 space-y-4">
        <input type="hidden" id="subject-id" value="" />
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Tên môn học</label>
          <input type="text" id="subject-name" required
            class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 focus:border-primary focus:ring-1 focus:ring-primary"
            placeholder="VD: Ứng dụng công nghệ thông tin cơ bản" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Mã môn (tùy chọn)</label>
          <input type="text" id="subject-code"
            class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 focus:border-primary focus:ring-1 focus:ring-primary"
            placeholder="VD: UDCNTTCB" />
        </div>
      </form>
      <div class="px-6 py-4 border-t border-slate-200 bg-slate-50 flex justify-end gap-3">
        <button type="button" id="subject-modal-cancel"
          class="px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-200 rounded-lg transition-colors">Hủy</button>
        <button type="button" id="subject-modal-save"
          class="px-4 py-2 text-sm font-medium bg-primary text-white rounded-lg hover:bg-primary/90 shadow-sm">Lưu</button>
      </div>
    </div>
  </div>
</div>
