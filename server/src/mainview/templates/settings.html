<div class="p-6 md:p-8 w-full max-w-7xl mx-auto flex flex-col gap-6">
    <div class="flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-bold">Quản lý Kỳ Thi</h1>
            <p class="text-slate-500 text-sm">Tạo và cấu hình các kỳ thi</p>
        </div>
        <button id="btn-create-exam"
            class="bg-primary text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-primary/90 flex items-center shadow-sm">
            <span class="material-symbols-outlined mr-2">add</span>Tạo kỳ thi
        </button>
    </div>

    <!-- Hidden file input for Excel import -->
    <input type="file" id="exam-import-excel" accept=".xlsx, .xls" class="hidden" />

    <!-- Exam List -->
    <div class="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="bg-slate-50 border-b border-slate-200">
                    <th class="px-6 py-4 text-sm font-medium text-slate-500">ID</th>
                    <th class="px-6 py-4 text-sm font-medium text-slate-500">Kỳ Thi / Cấu hình đề</th>
                    <th class="px-6 py-4 text-sm font-medium text-slate-500">Trạng Thái</th>
                    <th class="px-6 py-4 text-sm font-medium text-slate-500">Hành Động</th>
                </tr>
            </thead>
            <tbody id="exam-list">
                <tr>
                    <td colspan="4" class="text-center py-8 text-slate-500"><span
                            class="material-symbols-outlined animate-spin align-middle mr-2">refresh</span>Đang tải dữ
                        liệu...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Form Create Exam -->
    <div id="exam-form-panel" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-2xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="px-6 py-4 border-b border-slate-200 flex justify-between items-center">
                <h2 class="text-lg font-bold text-slate-900">Thêm Kỳ Thi Mới</h2>
                <button id="btn-close-exam-form" class="text-slate-400 hover:text-slate-600"><span
                        class="material-symbols-outlined">close</span></button>
            </div>
            <form id="exam-form" class="p-6 overflow-y-auto space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-1 text-slate-700">Tên Kỳ
                            Thi</label>
                        <input type="text" id="exam-name" required
                            class="w-full form-input rounded-lg border-slate-300 bg-white px-3 py-2 text-sm focus:border-primary focus:ring-1 focus:ring-primary"
                            placeholder="VD: Thi Giữa Kỳ Toán" />
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1 text-slate-700">Mã Kỳ Thi (Dùng
                            cho Client)</label>
                        <input type="text" id="exam-code" required
                            class="w-full form-input rounded-lg border-slate-300 bg-white px-3 py-2 text-sm focus:border-primary focus:ring-1 focus:ring-primary"
                            placeholder="VD: TOAN123" />
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 text-slate-700">Môn Thi</label>
                    <select id="exam-subject" required
                        class="w-full form-input rounded-lg border-slate-300 bg-white px-3 py-2 text-sm focus:border-primary focus:ring-1 focus:ring-primary"></select>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-1 text-slate-700">Thời gian bắt
                            đầu</label>
                        <input type="datetime-local" id="exam-start" required
                            class="w-full form-input rounded-lg border-slate-300 bg-white px-3 py-2 text-sm focus:border-primary focus:ring-1 focus:ring-primary" />
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1 text-slate-700">Thời gian kết
                            thúc</label>
                        <input type="datetime-local" id="exam-end" required
                            class="w-full form-input rounded-lg border-slate-300 bg-white px-3 py-2 text-sm focus:border-primary focus:ring-1 focus:ring-primary" />
                    </div>
                </div>
                <div class="border-t border-slate-200 pt-4 mt-4">
                    <h3 class="text-sm font-bold mb-3 text-slate-900">Cấu trúc đề thi (Số câu hỏi được
                        lấy ra từ ngân hàng)</h3>
                    <div class="grid grid-cols-1 gap-4">
                        <div>
                            <label class="block text-xs font-medium text-slate-700 mb-1">Tổng số câu hỏi</label>
                            <input type="number" id="exam-total" min="1" value="40" required
                                class="w-full form-input rounded-lg border-slate-300 bg-white px-3 py-2 text-sm font-medium focus:border-primary focus:ring-1 focus:ring-primary" />
                        </div>
                    </div>
                </div>
            </form>
            <div class="px-6 py-4 border-t border-slate-200 bg-slate-50 flex justify-end gap-3">
                <button type="button" id="btn-cancel-exam"
                    class="px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100 rounded-lg transition-colors">Hủy</button>
                <button type="button" id="btn-save-exam"
                    class="bg-primary text-white px-6 py-2 rounded-lg text-sm font-medium hover:bg-primary/90 shadow-sm transition-colors">Lưu
                    Kỳ Thi</button>
            </div>
        </div>
    </div>
</div>
